<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Embed YouTube Video</title>
    <style>
	    * {background-color: black} 
	    
        .youtube-video-container {
          position: relative;
          overflow: hidden;
          width: 100%;
        }

        .youtube-video-container::after {
          display: block;
          content: "";
          padding-top: 56.25%;
        }

        .youtube-video-container iframe {
          position: absolute;
          top: 0;
          left: 0;
          width: 100%;
          height: 100%;
        }
    </style>
</head>
<body>
    <div id="video-container">

    <script>
        // Example YouTube URL
        const hashPart = window.location.hash;
        const youtubeURL = hashPart.substring (1);

        // Function to get URL parameters
        function getURLParams(url) {
            const params = new URLSearchParams(new URL(url).search);
            return {
                v: params.get('v'),
                t: params.get('t')
            };
        }

        // Extract parameters
        const { v, t } = getURLParams(youtubeURL);

        // Embed YouTube video
        const videoContainer = document.getElementById('video-container');
        const embedURL = `https://www.youtube.com/embed/${v}?start=${t}`;
        videoContainer.innerHTML = `<iframe width="560" height="315" src="${embedURL}" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
    </script>
    </div>
</body>
</html>
