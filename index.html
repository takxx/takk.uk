<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>takk.uk</title>

	<script>
		const shortcode = window.location.href.substring(window.location.href.indexOf('#') + 1);
		console.log (shortcode);
		if (shortcode === "tw")
			{window.location.replace("https://takwing.com");}
	</script>

<style>
  html,body { height:100%; margin:0; display:flex; align-items:center; justify-content:center; background:#111; color:#ddd; font-family:Segoe UI,Roboto,Arial; -webkit-user-select:none; user-select:none; }
  #game { background:#000; image-rendering:pixelated; border:8px solid #222; box-shadow:0 6px 30px rgba(0,0,0,.7); touch-action: none; }
  #hud { text-align:center; margin-top:10px; color:#9ad; }
  button { margin-left:8px; padding:6px 10px; }
  /* touch controls */
  .touch-controls { position:fixed; left:12px; bottom:12px; width:160px; height:160px; display:flex; align-items:center; justify-content:center; z-index:40; }
  .dpad { position:relative; width:100%; height:100%; border-radius:12px; background:linear-gradient(#101010,#0b0b0b); box-shadow:inset 0 2px 0 rgba(255,255,255,0.03), 0 6px 20px rgba(0,0,0,0.6); display:grid; grid-template-columns:1fr 1fr 1fr; grid-template-rows:1fr 1fr 1fr; gap:6px; padding:10px; box-sizing:border-box; }
  .dpad button { background:rgba(255,255,255,0.03); border:0; color:#ddd; font-size:18px; border-radius:8px; touch-action:none; }
  .dpad button.center { background:transparent; pointer-events:none; }
  .mobile-only { display:none; }
  @media (max-width:900px) {
    .mobile-only { display:block; }
    .desktop-only { display:none; }
    #game { border-width:6px; }
  }
</style>
</head>

<body>
	<div>
		<canvas id="game" width="300" height="300"></canvas>
		<div id="hud">
		  <span id="score">Score: 0</span>
		  <button id="pause">Pause</button>
		  <button id="restart">Restart</button>
		  <div style="font-size:12px;margin-top:6px;color:#888">Arrow keys / WASD to move. Eat apples. Don't hit walls or yourself.</div>
		</div>
	  </div>
	
	  <!-- Touch controls -->
	  <div class="touch-controls mobile-only" id="touchControls" aria-hidden="false">
		<div class="dpad" id="dpad">
		  <button data-dir="up" aria-label="Up">▲</button>
		  <button class="center" aria-hidden="true"></button>
		  <button data-dir="right" aria-label="Right">►</button>
		  <button data-dir="left" aria-label="Left">◄</button>
		  <button class="center" aria-hidden="true"></button>
		  <button data-dir="down" aria-label="Down">▼</button>
		</div>
	  </div>
	
	<script>
	/* Nokia-like Snake with mobile touch (dpad + swipe) */
	
	const canvas = document.getElementById('game');
	const ctx = canvas.getContext('2d');
	
	const HUD = { score: document.getElementById('score'), pauseBtn: document.getElementById('pause'), restartBtn: document.getElementById('restart') };
	
	const GRID = { cols: 20, rows: 20, cell: 15 };
	let scale = 1;
	
	function resizeCanvas() {
	  const maxWidth = 420;
	  const maxHeight = 720; // allow tall on mobile
	  const w = Math.min(maxWidth, window.innerWidth - 40);
	  const h = Math.min(maxHeight, window.innerHeight - 120);
	  const size = Math.min(w, h);
	  scale = Math.floor(size / (GRID.cols * GRID.cell)) || 1;
	  canvas.width = GRID.cols * GRID.cell * scale;
	  canvas.height = GRID.rows * GRID.cell * scale;
	  canvas.style.width = canvas.width + 'px';
	  canvas.style.height = canvas.height + 'px';
	  draw();
	}
	window.addEventListener('resize', resizeCanvas);
	resizeCanvas();
	
	let snake, dir, nextDir, apple, score, speed, tickHandle, running;
	
	function reset() {
	  snake = [{ x:9,y:10 },{ x:8,y:10 },{ x:7,y:10 }];
	  dir = { x:1,y:0 };
	  nextDir = { ...dir };
	  placeApple();
	  score = 0;
	  speed = 8;
	  running = true;
	  HUD.pauseBtn.textContent = 'Pause';
	  updateScore();
	  if (tickHandle) cancelAnimationFrame(tickHandle);
	  lastTime = performance.now();
	  tickAccumulator = 0;
	  loop(lastTime);
	}
	
	function placeApple() {
	  const occupied = new Set(snake.map(p => p.x+','+p.y));
	  let tries=0;
	  while (true) {
		const pos = { x: Math.floor(Math.random()*GRID.cols), y: Math.floor(Math.random()*GRID.rows) };
		if (!occupied.has(pos.x+','+pos.y)) { apple = pos; return; }
		if (++tries>1000) { apple = null; return; }
	  }
	}
	
	function updateScore(){ HUD.score.textContent = 'Score: ' + score; }
	
	function step() {
	  dir = nextDir;
	  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
	  if (head.x < 0 || head.x >= GRID.cols || head.y < 0 || head.y >= GRID.rows) { gameOver(); return; }
	  for (let i=0;i<snake.length;i++){ if (snake[i].x===head.x && snake[i].y===head.y){ gameOver(); return; } }
	  snake.unshift(head);
	  if (apple && head.x===apple.x && head.y===apple.y) {
		score += 1;
		if (score % 3 === 0) speed = Math.min(20, speed+1);
		placeApple();
		updateScore();
	  } else snake.pop();
	}
	
	function drawGridBG(){
	  ctx.fillStyle = '#001';
	  ctx.fillRect(0,0,canvas.width,canvas.height);
	  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
	  ctx.lineWidth = Math.max(1, scale);
	  for (let x=0;x<=GRID.cols;x++){ const px = x*GRID.cell*scale; ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,canvas.height); ctx.stroke(); }
	  for (let y=0;y<=GRID.rows;y++){ const py = y*GRID.cell*scale; ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(canvas.width,py); ctx.stroke(); }
	}
	
	function draw(){
	  const csz = GRID.cell * scale;
	  drawGridBG();
	  if (apple){
		ctx.fillStyle = '#d12';
		roundRect(apple.x*csz + csz*0.12, apple.y*csz + csz*0.12, csz*0.76, csz*0.76, csz*0.18);
		ctx.fill();
	  }
	  for (let i=snake.length-1;i>=0;i--){
		const p = snake[i];
		ctx.fillStyle = (i===0) ? '#cddc39' : '#8bc34a';
		const x = p.x*csz + csz*0.08, y = p.y*csz + csz*0.08, w = csz*0.84, h = csz*0.84;
		roundRect(x,y,w,h, csz*0.16);
		ctx.fill();
	  }
	  const hpos = snake[0];
	  ctx.fillStyle = 'rgba(255,255,255,0.12)';
	  ctx.fillRect(hpos.x*csz + csz*0.18, hpos.y*csz + csz*0.12, csz*0.4, csz*0.18);
	}
	
	function roundRect(x,y,w,h,r){
	  ctx.beginPath();
	  ctx.moveTo(x+r,y);
	  ctx.arcTo(x+w,y,x+w,y+h,r);
	  ctx.arcTo(x+w,y+h,x,y+h,r);
	  ctx.arcTo(x,y+h,x,y,r);
	  ctx.arcTo(x,y,x+w,y,r);
	  ctx.closePath();
	}
	
	function gameOver(){
	  running = false;
	  HUD.pauseBtn.textContent = 'Paused';
	  ctx.fillStyle = 'rgba(150,0,0,0.35)';
	  ctx.fillRect(0,0,canvas.width,canvas.height);
	  setTimeout(()=>{ alert('Game Over — Score: '+score); reset(); }, 120);
	}
	
	const keyMap = {
	  ArrowUp: {x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0},
	  w:{x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
	  W:{x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0}
	};
	
	window.addEventListener('keydown', e=>{
	  if (e.key === ' ') { togglePause(); e.preventDefault(); return; }
	  const kd = keyMap[e.key];
	  if (!kd) return;
	  if (kd.x === -dir.x && kd.y === -dir.y) return;
	  nextDir = kd;
	});
	
	HUD.pauseBtn.addEventListener('click', togglePause);
	HUD.restartBtn.addEventListener('click', ()=>{ if (confirm('Restart game?')) reset(); });
	
	function togglePause(){ running = !running; HUD.pauseBtn.textContent = running ? 'Pause' : 'Resume'; }
	
	// Loop
	let lastTime = 0;
	let tickAccumulator = 0;
	function loop(timestamp){
	  tickHandle = requestAnimationFrame(loop);
	  const dt = (timestamp - lastTime)/1000;
	  lastTime = timestamp;
	  if (!running) { draw(); return; }
	  tickAccumulator += dt;
	  const interval = 1 / speed;
	  while (tickAccumulator >= interval){ step(); tickAccumulator -= interval; }
	  draw();
	}
	
	// --- Mobile: D-pad & Swipe ---
	
	// D-pad buttons
	const dpad = document.getElementById('dpad');
	dpad.addEventListener('pointerdown', e=>{
	  e.preventDefault();
	  const btn = e.target.closest('button[data-dir]');
	  if (!btn) return;
	  const dirName = btn.getAttribute('data-dir');
	  applyDirName(dirName);
	});
	
	// Allow holding buttons to repeatedly move in that direction by queuing nextDir
	let holdInterval = null;
	dpad.addEventListener('pointerdown', startHold);
	dpad.addEventListener('pointerup', endHold);
	dpad.addEventListener('pointercancel', endHold);
	dpad.addEventListener('pointerleave', endHold);
	
	function startHold(e){
	  const btn = e.target.closest('button[data-dir]');
	  if (!btn) return;
	  const dirName = btn.getAttribute('data-dir');
	  applyDirName(dirName);
	  clearInterval(holdInterval);
	  holdInterval = setInterval(()=> applyDirName(dirName), 150);
	}
	function endHold(e){
	  clearInterval(holdInterval); holdInterval = null;
	}
	
	// Swipe on canvas
	let touchStart = null;
	const swipeThreshold = 18; // pixels
	canvas.addEventListener('pointerdown', e=>{
	  // only track primary
	  if (e.isPrimary) {
		touchStart = { x: e.clientX, y: e.clientY, t: performance.now() };
		canvas.setPointerCapture(e.pointerId);
	  }
	});
	canvas.addEventListener('pointermove', e=>{
	  if (!touchStart) return;
	  // optional: visual feedback could go here
	});
	canvas.addEventListener('pointerup', e=>{
	  if (!touchStart) return;
	  const dx = e.clientX - touchStart.x;
	  const dy = e.clientY - touchStart.y;
	  const absX = Math.abs(dx), absY = Math.abs(dy);
	  if (Math.max(absX, absY) >= swipeThreshold) {
		if (absX > absY) {
		  applyDir({ x: dx > 0 ? 1 : -1, y: 0 });
		} else {
		  applyDir({ x: 0, y: dy > 0 ? 1 : -1 });
		}
	  } else {
		// tap toggles pause on small devices
		if (window.innerWidth < 900) togglePause();
	  }
	  try { canvas.releasePointerCapture(e.pointerId); } catch(e){;}
	  touchStart = null;
	});
	
	// Map direction names to vectors and apply (prevent reversing)
	function applyDirName(name){
	  const map = { up:{x:0,y:-1}, down:{x:0,y:1}, left:{x:-1,y:0}, right:{x:1,y:0} };
	  applyDir(map[name]);
	}
	function applyDir(kd){
	  if (!kd) return;
	  if (kd.x === -dir.x && kd.y === -dir.y) return;
	  nextDir = kd;
	}
	
	// Hide touch controls on desktop by setting aria-hidden and pointer-events
	function refreshControlVisibility(){
	  const tc = document.getElementById('touchControls');
	  if (window.innerWidth >= 900) {
		tc.style.display = 'none';
		tc.setAttribute('aria-hidden','true');
	  } else {
		tc.style.display = 'block';
		tc.setAttribute('aria-hidden','false');
	  }
	}
	window.addEventListener('resize', refreshControlVisibility);
	refreshControlVisibility();
	
	// Prevent two-finger page zoom/scroll while playing
	document.addEventListener('touchmove', e => { if (e.target === canvas) e.preventDefault(); }, { passive:false });
	
	// start game
	reset();
	
	</script>
</body>
</html>
