<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>takk.uk</title>

	<script>
		const shortcode = window.location.href.substring(window.location.href.indexOf('#') + 1);
		console.log (shortcode);
		if (shortcode === "tw")
			{window.location.replace("https://takwing.com");}
	</script>

<style>
  html,body { height:100%; margin:0; display:flex; align-items:center; justify-content:center; background:#111; color:#ddd; font-family:Segoe UI,Roboto,Arial; }
  #game { background:#000; image-rendering:pixelated; border:8px solid #222; box-shadow:0 6px 30px rgba(0,0,0,.7); }
  #hud { text-align:center; margin-top:10px; color:#9ad; }
  button { margin-left:8px; padding:6px 10px; }
</style>
</head>

<body>
  <div>
    <canvas id="game" width="300" height="300"></canvas>
    <div id="hud">
      <span id="score">Score: 0</span>
      <button id="pause">Pause</button>
      <button id="restart">Restart</button>
      <div style="font-size:12px;margin-top:6px;color:#888">Arrow keys / WASD to move. Eat apples. Don't hit walls or yourself.</div>
    </div>
  </div>

<script>

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

const HUD = { score: document.getElementById('score'), pauseBtn: document.getElementById('pause'), restartBtn: document.getElementById('restart') };

const GRID = { cols: 20, rows: 20, cell: 15 }; // logical grid
let scale = 1;

function resizeCanvas() {
  // fit to available canvas CSS size while keeping integer scale
  const maxWidth = 420;
  const maxHeight = 420;
  const w = Math.min(maxWidth, window.innerWidth - 40);
  const h = Math.min(maxHeight, window.innerHeight - 100);
  const size = Math.min(w, h);
  scale = Math.floor(size / (GRID.cols * GRID.cell) * 1) || 1;
  canvas.width = GRID.cols * GRID.cell * scale;
  canvas.height = GRID.rows * GRID.cell * scale;
  canvas.style.width = canvas.width + 'px';
  canvas.style.height = canvas.height + 'px';
  draw(); // redraw to scale
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Game state
let snake, dir, nextDir, apple, score, speed, tickHandle, running;

function reset() {
  snake = [
    { x: 9, y: 10 },
    { x: 8, y: 10 },
    { x: 7, y: 10 }
  ];
  dir = { x: 1, y: 0 };
  nextDir = { ...dir };
  placeApple();
  score = 0;
  speed = 8; // ticks per second
  running = true;
  HUD.pauseBtn.textContent = 'Pause';
  updateScore();
  if (tickHandle) cancelAnimationFrame(tickHandle);
  lastTime = performance.now();
  tickAccumulator = 0;
  loop(lastTime);
}

function placeApple() {
  const occupied = new Set(snake.map(p => p.x + ',' + p.y));
  let tries = 0;
  while (true) {
    const pos = { x: Math.floor(Math.random() * GRID.cols), y: Math.floor(Math.random() * GRID.rows) };
    if (!occupied.has(pos.x + ',' + pos.y)) { apple = pos; return; }
    if (++tries > 1000) { apple = null; return; }
  }
}

function updateScore() { HUD.score.textContent = 'Score: ' + score; }

// Movement & collision
function step() {
  dir = nextDir;
  const head = { x: (snake[0].x + dir.x), y: (snake[0].y + dir.y) };

  // wall collision
  if (head.x < 0 || head.x >= GRID.cols || head.y < 0 || head.y >= GRID.rows) {
    gameOver();
    return;
  }

  // self collision
  for (let i = 0; i < snake.length; i++) {
    if (snake[i].x === head.x && snake[i].y === head.y) { gameOver(); return; }
  }

  snake.unshift(head);

  // apple?
  if (apple && head.x === apple.x && head.y === apple.y) {
    score += 1;
    // speed up slightly every 3 apples
    if (score % 3 === 0) speed = Math.min(20, speed + 1);
    placeApple();
    updateScore();
  } else {
    snake.pop();
  }
}

// Drawing
function drawGridBG() {
  ctx.fillStyle = '#001';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  // subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = Math.max(1, scale);
  for (let x=0;x<=GRID.cols;x++) {
    const px = x * GRID.cell * scale;
    ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,canvas.height); ctx.stroke();
  }
  for (let y=0;y<=GRID.rows;y++) {
    const py = y * GRID.cell * scale;
    ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(canvas.width,py); ctx.stroke();
  }
}

function draw() {
  // cell px size
  const csz = GRID.cell * scale;
  // background
  drawGridBG();

  // apple
  if (apple) {
    ctx.fillStyle = '#d12';
    roundRect(apple.x * csz + csz*0.12, apple.y * csz + csz*0.12, csz*0.76, csz*0.76, csz*0.18);
    ctx.fill();
  }

  // snake
  for (let i = snake.length-1; i >=0; i--) {
    const p = snake[i];
    if (i === 0) ctx.fillStyle = '#cddc39';
    else ctx.fillStyle = '#8bc34a';
    const x = p.x * csz + csz*0.08;
    const y = p.y * csz + csz*0.08;
    const w = csz*0.84; const h = csz*0.84;
    roundRect(x,y,w,h, csz*0.16);
    ctx.fill();
  }

  // small glossy highlight on head
  const h = snake[0];
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(h.x*csz + csz*0.18, h.y*csz + csz*0.12, csz*0.4, csz*0.18);
}

function roundRect(x,y,w,h,r) {
  ctx.beginPath();
  ctx.moveTo(x+r,y);
  ctx.arcTo(x+w,y,x+w,y+h,r);
  ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r);
  ctx.arcTo(x,y,x+w,y,r);
  ctx.closePath();
}

// Game over
function gameOver() {
  running = false;
  HUD.pauseBtn.textContent = 'Paused';
  // flash red overlay and reset after short delay
  ctx.fillStyle = 'rgba(150,0,0,0.35)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  setTimeout(() => {
    alert('Game Over — Score: ' + score);
    reset();
  }, 100);
}

// Input
const keyMap = {
  ArrowUp: {x:0,y:-1}, ArrowDown: {x:0,y:1}, ArrowLeft: {x:-1,y:0}, ArrowRight: {x:1,y:0},
  w: {x:0,y:-1}, s:{x:0,y:1}, a:{x:-1,y:0}, d:{x:1,y:0},
  W: {x:0,y:-1}, S:{x:0,y:1}, A:{x:-1,y:0}, D:{x:1,y:0}
};

window.addEventListener('keydown', e => {
  if (e.key === ' ' ) { togglePause(); e.preventDefault(); return; }
  const kd = keyMap[e.key];
  if (!kd) return;
  // prevent reverse
  if (kd.x === -dir.x && kd.y === -dir.y) return;
  nextDir = kd;
});

HUD.pauseBtn.addEventListener('click', togglePause);
HUD.restartBtn.addEventListener('click', () => { if (confirm('Restart game?')) reset(); });

function togglePause() {
  running = !running;
  HUD.pauseBtn.textContent = running ? 'Pause' : 'Resume';
}

// Game loop (fixed timestep)
let lastTime = 0;
let tickAccumulator = 0;
function loop(timestamp) {
  tickHandle = requestAnimationFrame(loop);
  const dt = (timestamp - lastTime) / 1000;
  lastTime = timestamp;
  if (!running) { draw(); return; }

  tickAccumulator += dt;
  const interval = 1 / speed;
  while (tickAccumulator >= interval) {
    step();
    tickAccumulator -= interval;
  }
  draw();
}

// start
reset();

</script>
</body>
</html>
