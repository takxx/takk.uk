<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>takk.uk</title>

	<script>
		const shortcode = window.location.href.substring(window.location.href.indexOf('#') + 1);
		console.log (shortcode);
		if (shortcode === "tw")
			{window.location.replace("https://takwing.com");}
	</script>

<style>
  :root{
    --bg:#0b1220; --board:#07101a; --snake:#6be585; --food:#ff6b6b; --ui:#e6eef7;
  }
  html,body{height:100%;margin:0;background:var(--bg);color:var(--ui);font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
  .wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;box-sizing:border-box;gap:12px}
  .board{
    background:linear-gradient(180deg, rgba(255,255,255,0.02), transparent);
    border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:8px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.6);
  }
  canvas{background:var(--board);border-radius:8px;display:block;touch-action:none}
  .row{display:flex;gap:8px;align-items:center}
  button{background:transparent;border:1px solid rgba(230,238,247,0.12);color:var(--ui);padding:8px 12px;border-radius:8px;font-size:14px;cursor:pointer}
  .big{font-size:18px;padding:10px 16px}
  .score{font-weight:600}
  .controls{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  .touch-pad{position:relative;width:180px;height:180px;border-radius:12px;background:linear-gradient(180deg,rgba(255,255,255,0.02),transparent);display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(3,1fr);touch-action:none}
  .pad-btn{display:flex;align-items:center;justify-content:center;user-select:none}
  .pad-btn[data-dir=""]{opacity:0.06}
  @media (max-width:420px){
    .touch-pad{width:150px;height:150px}
  }
  .footer{font-size:12px;opacity:0.8}
</style>
</head>
<body>
<div class="wrap">
  <div class="board" id="board">
    <div class="row" style="width:100%;justify-content:space-between;align-items:center">
      <div>
        <div style="font-weight:700">takk.uk</div>
        <div style="font-size:12px;opacity:0.85">Have fun</div>
      </div>
      <div style="text-align:right">
        <div class="score" id="score">Score: 0</div>
        <div style="font-size:12px;opacity:0.85" id="speed-label">Speed: Normal</div>
      </div>
    </div>

    <canvas id="game"></canvas>

    <div class="controls" id="controls">
      <button id="start" class="big">Start</button>
      <button id="pause">Pause</button>
      <button id="reset">Reset</button>
      <label style="display:flex;align-items:center;gap:6px">
        <span style="font-size:13px">Size</span>
        <select id="size">
          <option value="16">16×16</option>
          <option value="20" selected>20×20</option>
          <option value="24">24×24</option>
          <option value="28">28×28</option>
        </select>
      </label>
      <label style="display:flex;align-items:center;gap:6px">
        <span style="font-size:13px">Speed</span>
        <select id="speed">
          <option value="120">Slow</option>
          <option value="90" selected>Normal</option>
          <option value="60">Fast</option>
          <option value="40">Very fast</option>
        </select>
      </label>
    </div>

    <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap;justify-content:center">
      <div class="touch-pad" id="touchPad" aria-hidden="true">
        <div class="pad-btn" data-dir="nw"></div>
        <div class="pad-btn" data-dir="up">▲</div>
        <div class="pad-btn" data-dir="ne"></div>
        <div class="pad-btn" data-dir="left">◀</div>
        <div class="pad-btn" data-dir=""></div>
        <div class="pad-btn" data-dir="right">▶</div>
        <div class="pad-btn" data-dir="sw"></div>
        <div class="pad-btn" data-dir="down">▼</div>
        <div class="pad-btn" data-dir="se"></div>
      </div>
      <div style="max-width:260px;text-align:left;font-size:13px">
        <div><strong>Controls:</strong> Arrow keys / WASD / on-screen pad</div>
        <div style="margin-top:6px;color:var(--ui);opacity:0.85">Tap Start, use the pad or keyboard. Tap canvas to toggle pause.</div>
      </div>
    </div>
  </div>
</div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d', {alpha:false});
  const startBtn = document.getElementById('start');
  const pauseBtn = document.getElementById('pause');
  const resetBtn = document.getElementById('reset');
  const scoreEl = document.getElementById('score');
  const speedSel = document.getElementById('speed');
  const sizeSel = document.getElementById('size');
  const speedLabel = document.getElementById('speed-label');
  const touchPad = document.getElementById('touchPad');

  let cols = +sizeSel.value;
  let rows = cols;
  let cellSize = 20;
  let speed = +speedSel.value; // ms per tick
  let gameInterval = null;
  let snake = [];
  let dir = {x:1,y:0};
  let nextDir = {...dir};
  let food = null;
  let score = 0;
  let running = false;
  let paused = false;
  let lastTick = 0;

  function resizeCanvas(){
    // compute cell size to fit viewport but preserve square board
    const maxWidth = Math.min(window.innerWidth - 48, 720);
    const maxHeight = Math.min(window.innerHeight - 220, 720);
    const sizePx = Math.min(maxWidth, maxHeight);
    cellSize = Math.floor(sizePx / Math.max(cols, rows));
    canvas.width = cellSize * cols;
    canvas.height = cellSize * rows;
    canvas.style.width = canvas.width + 'px';
    canvas.style.height = canvas.height + 'px';
    draw();
  }

  function resetGame(init=true){
    cols = +sizeSel.value;
    rows = cols;
    speed = +speedSel.value;
    speedLabel.textContent = `Speed: ${speedSel.options[speedSel.selectedIndex].text}`;
    snake = [];
    const mid = {x: Math.floor(cols/2), y: Math.floor(rows/2)};
    snake.push({x:mid.x-1,y:mid.y});
    snake.push({x:mid.x,y:mid.y});
    snake.push({x:mid.x+1,y:mid.y});
    dir = {x:1,y:0};
    nextDir = {...dir};
    score = 0;
    food = randomFood();
    running = init ? false : running;
    paused = false;
    updateScore();
    resizeCanvas();
  }

  function randomFood(){
    const occupied = new Set(snake.map(s => s.x+','+s.y));
    let x,y; let attempts = 0;
    do {
      x = Math.floor(Math.random()*cols);
      y = Math.floor(Math.random()*rows);
      attempts++;
      if(attempts>1000) break;
    } while (occupied.has(x+','+y));
    return {x,y};
  }

  function drawGrid(){
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--board').trim() || '#07101a';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
    ctx.lineWidth = 1;
    // optional subtle grid
    for(let x=1;x<cols;x++){
      const px = x*cellSize + 0.5;
      ctx.beginPath(); ctx.moveTo(px,0); ctx.lineTo(px,canvas.height); ctx.stroke();
    }
    for(let y=1;y<rows;y++){
      const py = y*cellSize + 0.5;
      ctx.beginPath(); ctx.moveTo(0,py); ctx.lineTo(canvas.width,py); ctx.stroke();
    }
  }

  function draw(){
    // clear & grid
    drawGrid();

    // draw food
    if(food){
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--food').trim() || '#ff6b6b';
      roundRectFill(food.x*cellSize+2, food.y*cellSize+2, cellSize-4, cellSize-4, Math.max(4,cellSize/5));
    }

    // draw snake
    for(let i=0;i<snake.length;i++){
      const s = snake[i];
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--snake').trim() || '#6be585';
      roundRectFill(s.x*cellSize+1, s.y*cellSize+1, cellSize-2, cellSize-2, Math.max(4,cellSize/4));
      // add eye to head
      if(i===snake.length-1){
        ctx.fillStyle = '#072019';
        const ex = s.x*cellSize + (dir.x>0?cellSize*0.7:(dir.x<0?cellSize*0.3:cellSize*0.5));
        const ey = s.y*cellSize + (dir.y>0?cellSize*0.7:(dir.y<0?cellSize*0.3:cellSize*0.5));
        ctx.beginPath(); ctx.arc(ex,ey,Math.max(1,cellSize*0.08),0,Math.PI*2); ctx.fill();
      }
    }
  }

  function roundRectFill(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y);
    ctx.arcTo(x+w,y,x+w,y+h,r);
    ctx.arcTo(x+w,y+h,x,y+h,r);
    ctx.arcTo(x,y+h,x,y,r);
    ctx.arcTo(x,y,x+w,y,r);
    ctx.closePath();
    ctx.fill();
  }

  function updateScore(){
    scoreEl.textContent = `Score: ${score}`;
  }

  function tick(){
    // apply nextDir with no reverse into immediate opposite
    if((nextDir.x !== -dir.x || nextDir.y !== -dir.y)) dir = {...nextDir};
    const head = {...snake[snake.length-1], x: snake[snake.length-1].x + dir.x, y: snake[snake.length-1].y + dir.y};

    // wall collision: if head is outside grid -> game over
    if(head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows){
      gameOver();
      return;
    }

    // collision with self?
    for(let s of snake){
      if(s.x === head.x && s.y === head.y){
        gameOver();
        return;
      }
    }

    snake.push(head);

    // eat food?
    if(food && head.x === food.x && head.y === food.y){
      score += 1;
      updateScore();
      food = randomFood();
    } else {
      // move by removing tail
      snake.shift();
    }

    draw();
  }

  function gameOver(){
    stopLoop();
    running = false;
    paused = false;
    draw();
    setTimeout(()=> alert(`Game over — Score: ${score}`), 50);
  }

  function startLoop(){
    if(running) return;
    running = true;
    paused = false;
    stopLoop();
    gameInterval = setInterval(tick, speed);
  }

  function stopLoop(){
    if(gameInterval) { clearInterval(gameInterval); gameInterval = null; }
  }

  // Input handling
  const keyMap = {
    'ArrowUp': {x:0,y:-1}, 'ArrowDown': {x:0,y:1}, 'ArrowLeft': {x:-1,y:0}, 'ArrowRight': {x:1,y:0},
    'w':{x:0,y:-1}, 's':{x:0,y:1}, 'a':{x:-1,y:0}, 'd':{x:1,y:0},
  };

  window.addEventListener('keydown', (e) => {
    const k = e.key;
    if(k === ' '){ // space toggles pause
      e.preventDefault();
      togglePause();
      return;
    }
    const m = keyMap[k] || keyMap[k.toLowerCase()];
    if(m){
      e.preventDefault();
      setDirection(m);
    }
  });

  function setDirection(m){
    // queue direction; prevent reversing into self (opposite)
    if(m.x === -dir.x && m.y === -dir.y) return;
    nextDir = {...m};
  }

  // Touch / on-screen pad
  let touchActive = false;
  touchPad.addEventListener('pointerdown', onPadPointer);
  touchPad.addEventListener('pointermove', onPadPointer);
  touchPad.addEventListener('pointerup', ()=> touchActive=false);
  touchPad.addEventListener('pointercancel', ()=> touchActive=false);
  touchPad.addEventListener('pointerleave', ()=> touchActive=false);

  function onPadPointer(e){
    e.preventDefault();
    touchActive = true;
    const el = document.elementFromPoint(e.clientX, e.clientY);
    if(!el) return;
    const dirAttr = el.getAttribute && el.getAttribute('data-dir');
    if(!dirAttr) return;
    switch(dirAttr){
      case 'up': setDirection({x:0,y:-1}); break;
      case 'down': setDirection({x:0,y:1}); break;
      case 'left': setDirection({x:-1,y:0}); break;
      case 'right': setDirection({x:1,y:0}); break;
    }
  }

  // Tap canvas to pause/resume
  canvas.addEventListener('click', () => togglePause());

  function togglePause(){
    if(!running){ startLoop(); return; }
    paused = !paused;
    if(paused){ stopLoop(); pauseBtn.textContent = 'Resume'; }
    else { startLoop(); pauseBtn.textContent = 'Pause'; }
  }

  // UI buttons
  startBtn.addEventListener('click', () => { resetGame(false); startLoop(); });
  pauseBtn.addEventListener('click', () => togglePause());
  resetBtn.addEventListener('click', () => { resetGame(true); });

  // handle size/speed changes
  sizeSel.addEventListener('change', () => { resetGame(true); });
  speedSel.addEventListener('change', () => {
    speed = +speedSel.value;
    speedLabel.textContent = `Speed: ${speedSel.options[speedSel.selectedIndex].text}`;
    if(running && !paused){ startLoop(); } // restart interval with new speed
  });

  // Prevent gestures from scrolling while interacting
  ['touchstart','touchmove','touchend','gesturestart'].forEach(evt => {
    document.addEventListener(evt, (e) => {
      if(e.target === canvas || touchPad.contains(e.target)) e.preventDefault();
    }, {passive:false});
  });

  // Resize handling
  window.addEventListener('resize', resizeCanvas);

  // Init
  resetGame(true);
  draw();

  // Accessibility: focusable pad buttons (keyboard support)
  Array.from(touchPad.querySelectorAll('.pad-btn')).forEach(btn=>{
    if(btn.dataset.dir){
      btn.tabIndex = 0;
      btn.addEventListener('keydown', (e)=>{
        if(e.key === 'Enter' || e.key === ' ') onPadButton(btn.dataset.dir);
      });
      btn.addEventListener('click', ()=> onPadButton(btn.dataset.dir));
    }
  });
  function onPadButton(dirAttr){
    switch(dirAttr){
      case 'up': setDirection({x:0,y:-1}); break;
      case 'down': setDirection({x:0,y:1}); break;
      case 'left': setDirection({x:-1,y:0}); break;
      case 'right': setDirection({x:1,y:0}); break;
      default: break;
    }
    if(!running) startLoop();
  }

  // Optional: make canvas high-DPI crisp
  (function adjustHDPI(){
    const ratio = window.devicePixelRatio || 1;
    if(ratio === 1) return;
    canvas.width *= ratio;
    canvas.height *= ratio;
    canvas.style.width = (canvas.width/ratio) + 'px';
    canvas.style.height = (canvas.height/ratio) + 'px';
    ctx.setTransform(ratio,0,0,ratio,0,0);
    draw();
  })();

})();
</script>
</body>
</html>
